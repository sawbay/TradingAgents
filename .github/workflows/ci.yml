name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: uv run python -m compileall tradingagents cli main.py

      - name: Run tests
        if: ${{ hashFiles('tests/**/*.py') != '' }}
        run: uv run pytest

  build:
    name: Build And Audit
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build distribution artifacts
        run: uv build

      - name: Check built artifacts
        run: uv run --with twine twine check dist/*

      - name: Export locked dependencies
        run: uv export --frozen --no-hashes --format requirements-txt -o requirements-ci.txt

      - name: Scan dependencies for vulnerabilities
        continue-on-error: true
        run: uvx --with pip-audit pip-audit --requirement requirements-ci.txt --skip-editable

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error
